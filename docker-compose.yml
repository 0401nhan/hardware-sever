services:
  hardware-server:
    build: .
    image: 0401nhan/hardware-server:0.1.13
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - hardware-server-data:/data
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 7000
      PUBLIC_URL: ${PUBLIC_URL:-https://server.electricbird.vn}
      DB_PATH: /data/hardware-server.sqlite
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session-secret}
      TAILSCALE_GATEWAY_TIMEOUT_MS: ${TAILSCALE_GATEWAY_TIMEOUT_MS:-10000}
      TAILSCALE_SYNC_ENABLED: ${TAILSCALE_SYNC_ENABLED:-true}
      TAILSCALE_CLI_PATH: ${TAILSCALE_CLI_PATH:-tailscale}
      TAILSCALE_SYNC_INTERVAL_MS: ${TAILSCALE_SYNC_INTERVAL_MS:-30000}
      TAILSCALE_SYNC_TIMEOUT_MS: ${TAILSCALE_SYNC_TIMEOUT_MS:-5000}
      TAILSCALE_SYNC_OS: ${TAILSCALE_SYNC_OS:-linux}
      TAILSCALE_SYNC_UI_PORT: ${TAILSCALE_SYNC_UI_PORT:-80}
      TAILSCALE_SYNC_SSH_PORT: ${TAILSCALE_SYNC_SSH_PORT:-22}
      TAILSCALE_SYNC_TAG: ${TAILSCALE_SYNC_TAG:-tag:gateway}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
volumes:
  hardware-server-data:
