services:
  hardware-server:
    build: .
    image: 0401nhan/hardware-server:0.1.3
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - hardware-server-data:/data
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 7000
      PUBLIC_URL: https://server.electricbird.vn
      DB_PATH: /data/hardware-server.sqlite
      DEVICE_TEMPLATES_PATH: /app/config/device-templates.yml
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      SESSION_SECRET: change-me-session-secret
      TOKEN_HASH_SECRET: change-me-token-secret
      PROVISIONING_TOKEN: change-me-provisioning-token
      AUTO_REGISTER_GATEWAYS: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  hardware-server-data:
