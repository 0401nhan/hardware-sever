services:
  hardware-server:
    build: .
    image: electricbird/hardware-server:0.1.0
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - hardware-server-data:/data
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      PUBLIC_URL: https://server.eletricbird.vn
      DB_PATH: /data/hardware-server.sqlite
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      SESSION_SECRET: change-me-session-secret
      TOKEN_HASH_SECRET: change-me-token-secret
      AUTO_REGISTER_GATEWAYS: "false"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  hardware-server-data:
