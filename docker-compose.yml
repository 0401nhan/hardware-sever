services:
  hardware-server:
    build: .
    image: 0401nhan/hardware-server:0.1.9
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - hardware-server-data:/data
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 7000
      PUBLIC_URL: ${PUBLIC_URL:-https://server.electricbird.vn}
      DB_PATH: /data/hardware-server.sqlite
      DEVICE_TEMPLATES_PATH: /app/config/device-templates.yml
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session-secret}
      TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-change-me-token-secret}
      PROVISIONING_TOKEN: ${PROVISIONING_TOKEN:-change-me-provisioning-token}
      AUTO_REGISTER_GATEWAYS: ${AUTO_REGISTER_GATEWAYS:-true}
      TELEMETRY_RETENTION_MS: ${TELEMETRY_RETENTION_MS:-2592000000}
      TELEMETRY_PRUNE_INTERVAL_MS: ${TELEMETRY_PRUNE_INTERVAL_MS:-3600000}
      STORE_DRIVER: ${STORE_DRIVER:-mongodb}
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI is required}
      MONGODB_DB: ${MONGODB_DB:-hardware_gateway}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  hardware-server-data:
